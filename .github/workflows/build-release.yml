name: Build and Release

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ----------- BUILD STEPS -----------
      - name: Build Linux
        run: dotnet publish VulkanMC/VulkanMC.csproj -c Release -r linux-x64 --self-contained -o build/linux
      - name: Build Windows
        run: |
          dotnet publish VulkanMC/VulkanMC.csproj -c Release -r win-x64 --self-contained -o build/win
          # Copie/renomme l'exécutable en racine build/ avec le nom attendu
          if [ -f build/win/VulkanMC.exe ]; then
            cp build/win/VulkanMC.exe build/vulkanmc-win-x64.exe
          fi

      - name: Copy assets to build/win
        run: |
          cp -r VulkanMC/VulkanMC/Fonts build/win/
          cp -r VulkanMC/VulkanMC/Textures build/win/
          cp -r VulkanMC/VulkanMC/UI build/win/
          cp VulkanMC/VulkanMC/config.toml build/win/
      - name: Create tar.gz for Linux
        run: tar -czvf build/VulkanMC-linux-x64.tar.gz -C build/linux .
      - name: Install fpm
        run: sudo gem install --no-document fpm
      - name: Create DEB & RPM
        run: |
          mkdir -p pkg/usr/local/bin
          cp -r build/linux/* pkg/usr/local/bin/
          fpm -s dir -t deb -n vulkanmc -v 1.0.0 -C pkg .
          fpm -s dir -t rpm -n vulkanmc -v 1.0.0 -C pkg .

      # ----------- RENAME -----------
      - name: Rename Windows exe
        run: |
          [ -f build/VulkanMC-win-x64.exe ] && mv build/VulkanMC-win-x64.exe build/vulkanmc-win-x64.exe || true
      - name: Rename Linux tar.gz
        run: |
          [ -f build/VulkanMC-linux-x64.tar.gz ] && mv build/VulkanMC-linux-x64.tar.gz build/vulkanmc-linux-x64.tar.gz || true

      # ----------- RELEASE -----------
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: VulkanMC v${{ github.run_number }}
          draft: false
          prerelease: false

      # ----------- CHECK FILES -----------
      - name: Check exe exists
        id: exe_exists
        run: |
          if [ -f build/vulkanmc-win-x64.exe ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Check tar.gz exists
        id: tar_exists
        run: |
          if [ -f build/vulkanmc-linux-x64.tar.gz ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Check deb exists
        id: deb_exists
        run: |
          if [ -f vulkanmc_1.0.0_amd64.deb ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Check rpm exists
        id: rpm_exists
        run: |
          if [ -f vulkanmc-1.0.0-1.x86_64.rpm ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # ----------- UPLOAD -----------
      - name: Upload Windows exe
        if: ${{ steps.exe_exists.outputs.exists == 'true' }}
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: build/vulkanmc-win-x64.exe
          asset_name: vulkanmc-win-x64.exe
          asset_content_type: application/octet-stream

      - name: Upload Linux tar.gz
        if: ${{ steps.tar_exists.outputs.exists == 'true' }}
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: build/vulkanmc-linux-x64.tar.gz
          asset_name: vulkanmc-linux-x64.tar.gz
          asset_content_type: application/gzip

      - name: Upload Linux DEB
        if: ${{ steps.deb_exists.outputs.exists == 'true' }}
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: vulkanmc_1.0.0_amd64.deb
          asset_name: vulkanmc_1.0.0_amd64.deb
          asset_content_type: application/octet-stream

      - name: Upload Linux RPM
        if: ${{ steps.rpm_exists.outputs.exists == 'true' }}
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: vulkanmc-1.0.0-1.x86_64.rpm
          asset_name: vulkanmc-1.0.0-1.x86_64.rpm
          asset_content_type: application/octet-stream

      - name: Upload macOS
        run: |
          for f in build/vulkanmc-osx-x64.*; do
            if [ -f "$f" ]; then
              gh release upload v${{ github.run_number }} "$f" --clobber
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
