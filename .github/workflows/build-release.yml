name: Build and Release
on: workflow_dispatch

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET + Tools
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: Install dependencies
        run: |
          sudo gem install --no-document fpm
          sudo apt-get update && sudo apt-get install -y fakeroot zstd jq
      
      - name: Build
        run: chmod +x scripts/*.sh && ./scripts/build-all.sh
        
      - name: Package DEB
        run: ./scripts/package-deb.sh
        
      - name: Package RPM
        run: ./scripts/package-rpm.sh
        
      - name: Package Arch
        run: ./scripts/package-arch.sh
        
      - name: Create Release & Upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: v${{ github.run_number }}
        run: ./scripts/upload-release.sh
