name: Build and Release
on: workflow_dispatch

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: Install tools
        run: |
          sudo gem install --no-document fpm
          sudo apt-get update && sudo apt-get install -y fakeroot zstd jq
      
      - name: Build all
        run: |
          chmod +x .github/scripts/*.sh
          .github/scripts/build-all.sh
      
      - name: Package DEB
        run: .github/scripts/package-deb.sh
      
      - name: Package RPM
        run: .github/scripts/package-rpm.sh
      
      - name: Package Arch
        run: .github/scripts/package-arch.sh
      
      - name: Upload Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: v${{ github.run_number }}
        run: .github/scripts/upload-release.sh
