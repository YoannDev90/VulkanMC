name: Build and Release

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # ----------- BUILD STEPS -----------
      - name: Build Linux
        run: dotnet publish VulkanMC/VulkanMC.csproj -c Release -r linux-x64 --self-contained -o build/linux
      - name: Build Windows
        run: dotnet publish VulkanMC/VulkanMC.csproj -c Release -r win-x64 --self-contained -o build/win
      - name: Build macOS
        run: dotnet publish VulkanMC/VulkanMC.csproj -c Release -r osx-x64 --self-contained -o build/mac

      - name: Create ZIP/Tarballs
        run: |
          zip -r build/VulkanMC-win-x64.zip build/win
          zip -r build/VulkanMC-osx-x64.zip build/mac
          tar -czvf build/VulkanMC-linux-x64.tar.gz -C build/linux .

      - name: Install WiX Toolset
        run: |
          sudo apt-get update
          sudo apt-get install -y wixl
      - name: Build MSI for Windows
        run: |
          wixl -o build/VulkanMC-win-x64.msi wix/VulkanMC.wxs || echo 'MSI build failed'

      - name: Install fpm
        run: sudo gem install --no-document fpm
      - name: Create DEB & RPM
        run: |
          mkdir -p pkg/usr/local/bin
          cp build/linux/* pkg/usr/local/bin/
          fpm -s dir -t deb -n vulkanmc -v 1.0.0 -C pkg .
          fpm -s dir -t rpm -n vulkanmc -v 1.0.0 -C pkg .

      - name: Install AppImage tool
        run: |
          sudo apt-get update
          sudo apt-get install -y appimagetool
      - name: Build AppImage
        run: |
          mkdir -p AppDir/usr/bin
          cp build/linux/* AppDir/usr/bin/
          (cd AppDir && appimagetool . ../build/VulkanMC-linux-x64.AppImage) || echo 'AppImage build failed'

      - name: Install Snapcraft
        run: sudo snap install snapcraft --classic
      - name: Build Snap
        run: |
          snapcraft --output build/VulkanMC-linux-x64.snap || echo 'Snap build failed'

      - name: Install macOS packaging tools
        run: |
          npm install -g create-dmg
      - name: Build DMG & PKG
        run: |
          create-dmg build/mac build/VulkanMC-osx-x64.dmg || echo 'DMG build failed'
          pkgbuild --root build/mac --identifier com.vulkanmc --version 1.0.0 build/VulkanMC-osx-x64.pkg || echo 'PKG build failed'

      # ----------- RENAME -----------
      - name: Rename artifacts
        run: |
          # Windows
          [ -f build/VulkanMC-win-x64.exe ] && mv build/VulkanMC-win-x64.exe build/vulkanmc-win-x64.exe || true
          [ -f build/VulkanMC-win-x64.zip ] && mv build/VulkanMC-win-x64.zip build/vulkanmc-win-x64.zip || true
          [ -f build/VulkanMC-win-x64.msi ] && mv build/VulkanMC-win-x64.msi build/vulkanmc-win-x64.msi || true
          # Linux
          [ -f build/VulkanMC-linux-x64.tar.gz ] && mv build/VulkanMC-linux-x64.tar.gz build/vulkanmc-linux-x64.tar.gz || true
          [ -f build/VulkanMC-linux-x64.AppImage ] && mv build/VulkanMC-linux-x64.AppImage build/vulkanmc-linux-x64.AppImage || true
          [ -f build/VulkanMC-linux-x64.snap ] && mv build/VulkanMC-linux-x64.snap build/vulkanmc-linux-x64.snap || true
          # macOS
          [ -f build/VulkanMC-osx-x64.zip ] && mv build/VulkanMC-osx-x64.zip build/vulkanmc-osx-x64.zip || true
          [ -f build/VulkanMC-osx-x64.dmg ] && mv build/VulkanMC-osx-x64.dmg build/vulkanmc-osx-x64.dmg || true
          [ -f build/VulkanMC-osx-x64.pkg ] && mv build/VulkanMC-osx-x64.pkg build/vulkanmc-osx-x64.pkg || true

      # ----------- RELEASE -----------
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: VulkanMC v${{ github.run_number }}
          draft: false
          prerelease: false

      # ----------- UPLOAD -----------
      - name: Upload Windows
        run: |
          for f in build/vulkanmc-win-x64.*; do
            if [ -f "$f" ]; then
              gh release upload v${{ github.run_number }} "$f" --clobber
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux
        run: |
          for f in build/vulkanmc-linux-x64.* *.deb *.rpm; do
            if [ -f "$f" ]; then
              gh release upload v${{ github.run_number }} "$f" --clobber
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS
        run: |
          for f in build/vulkanmc-osx-x64.*; do
            if [ -f "$f" ]; then
              gh release upload v${{ github.run_number }} "$f" --clobber
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
